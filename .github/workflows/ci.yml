name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
      - run: buf lint
      - name: buf breaking against last tag
        if: github.event_name == 'pull_request'
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then
            buf breaking --against ".git#tag=${last_tag}"
          else
            echo "no prior tag; skipping breaking check"
          fi
