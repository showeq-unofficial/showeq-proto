syntax = "proto3";

package seq.v1;

import "seq/v1/events.proto";

// Client -> server topic subscriptions. Not all topics are implemented yet;
// the daemon currently only honors SPAWNS, ZONE, and PLAYER.
enum Topic {
  TOPIC_UNSPECIFIED = 0;
  SPAWNS = 1;
  ZONE = 2;
  PLAYER = 3;
  CHAT = 4;
  COMBAT = 5;
  GROUP = 6;
  EXP = 7;
}

message Subscribe {
  repeated Topic topics = 1;

  // Session resume (deferred post-Phase-2, tracked in MODERNIZATION_PLAN.md).
  //
  // Intent: when set together, the daemon looks up `session_id` in a short
  // per-session ring buffer and replays envelopes with seq > last_seq,
  // falling back to a fresh Snapshot if the gap exceeds the buffer window
  // (design target ~30s). Field numbers reserved up front so adding the
  // implementation later is additive, not a proto break. Today the daemon
  // ignores these fields and always sends a fresh Snapshot.
  optional string session_id = 2;
  optional uint64 last_seq = 3;
}

// Client -> server filter-rule mutation. Daemon applies via
// FilterMgr::addFilter / addZoneFilter, persists to the corresponding
// XML file, and broadcasts an updated FilterRulesUpdate to all
// connected clients on the resulting filtersChanged signal.
message AddFilterRule {
  uint32 filter_type = 1;
  string pattern     = 2;
  bool   per_zone    = 3;
}

message RemoveFilterRule {
  uint32 filter_type = 1;
  string pattern     = 2;
  bool   per_zone    = 3;
}

// Client -> server filter-rule edit. Daemon applies via FilterMgr's
// editFilter / editZoneFilter, which do an atomic remove(old)+add(new)
// with a single filtersChanged emit — so other connected clients see
// one FilterRulesUpdate instead of a transient empty state followed
// by a re-add. filter_type and per_zone identify the rule; new_pattern
// replaces old_pattern. Changing filter_type or per_zone is not
// supported via this message — use Remove + Add instead.
message EditFilterRule {
  uint32 filter_type  = 1;
  string old_pattern  = 2;
  string new_pattern  = 3;
  bool   per_zone     = 4;
}

// Client -> server trigger to persist the in-memory filter rules to
// the corresponding XML file on the daemon side. Mirrors showeq-c's
// "Save Filters" / "Save Zone Filters" menu items: filter mutations
// (add / remove / edit) live in memory only until an explicit save,
// so the operator's hand-curated XML files aren't stomped on every
// click. per_zone=false writes the global filters file; per_zone=true
// writes the current zone's overlay file. The daemon does not emit
// any acknowledgement envelope today — fire and forget.
message SaveFilters {
  bool per_zone = 1;
}

// Client -> server trigger to re-read filter XML files from disk. Used
// when an operator edits the files outside the daemon and wants the
// running process to pick up the changes without restart. The daemon
// reloads global + current-zone filter sets, then emits the usual
// filtersChanged signal — SpawnShell re-evaluates flag bits on every
// spawn and SessionAdapter broadcasts a fresh FilterRulesUpdate to
// every connected client. No fields needed.
message ReloadFilters {}

// Client -> server preference mutation. Daemon validates against the
// PrefsBroker allowlist, applies via XMLPreferences, persists the user
// XML file, and broadcasts a PrefChanged envelope to every connected
// client (including the originator). Unknown / not-allowlisted keys are
// silently dropped — no error envelope yet.
message SetPref {
  Pref pref = 1;
}

// Client -> server request to enumerate available pcap capture devices
// (mirrors showeq-c's "Select Network Device" dialog backed by
// pcap_findalldevs). The daemon replies with a DevicesList envelope on
// the same connection only — not broadcast. Empty payload.
message ListDevices {}

// Client -> server: assign a user-curated label to a spawn point.
// Mirrors showeq-c's right-click "Rename Spawn Point..." menu item
// (spawnpointlist.cpp:296). `key` is the SpawnPoint::key form already
// echoed in SpawnPoint.key (decimal x|y|z concatenated). Empty `name`
// clears the label. The daemon calls SpawnMonitor::setName which
// updates the in-memory point, persists the zone's <zone>.sp file
// (write-through — legacy showeq saved on zone change only, but we
// want a single rename to survive a daemon crash), and broadcasts a
// SpawnPointUpdated envelope to every connected client. Unknown keys
// are silently dropped — no error envelope yet.
message RenameSpawnPoint {
  string key  = 1;
  string name = 2;
}

// Client -> server: switch the daemon's active decode target to
// `box_id` (as seen in BoxListUpdated.boxes[].box_id). v1 of the
// multibox feature (Stage 4 of docs/MULTIBOX_PLAN.md) treats active
// as cosmetic — the daemon records the choice and re-emits
// BoxListUpdated with the new active_box_id, but state-manager decode
// switching lands in Stage 3. Unknown box_id values are silently
// dropped — no error envelope yet.
message SetActiveBox {
  string box_id = 1;
}

message ClientEnvelope {
  oneof payload {
    Subscribe        subscribe           = 1;
    AddFilterRule    add_filter_rule     = 2;
    RemoveFilterRule remove_filter_rule  = 3;
    SetPref          set_pref            = 4;
    ReloadFilters    reload_filters      = 5;
    EditFilterRule   edit_filter_rule    = 6;
    SaveFilters      save_filters        = 7;
    ListDevices      list_devices        = 8;
    RenameSpawnPoint rename_spawn_point  = 9;
    SetActiveBox     set_active_box      = 10;
  }
}
