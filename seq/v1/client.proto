syntax = "proto3";

package seq.v1;

// Client -> server topic subscriptions. Not all topics are implemented yet;
// the daemon currently only honors SPAWNS, ZONE, and PLAYER.
enum Topic {
  TOPIC_UNSPECIFIED = 0;
  SPAWNS = 1;
  ZONE = 2;
  PLAYER = 3;
  CHAT = 4;
  COMBAT = 5;
  GROUP = 6;
  EXP = 7;
}

message Subscribe {
  repeated Topic topics = 1;

  // Session resume (deferred post-Phase-2, tracked in MODERNIZATION_PLAN.md).
  //
  // Intent: when set together, the daemon looks up `session_id` in a short
  // per-session ring buffer and replays envelopes with seq > last_seq,
  // falling back to a fresh Snapshot if the gap exceeds the buffer window
  // (design target ~30s). Field numbers reserved up front so adding the
  // implementation later is additive, not a proto break. Today the daemon
  // ignores these fields and always sends a fresh Snapshot.
  optional string session_id = 2;
  optional uint64 last_seq = 3;
}

// Client -> server filter-rule mutation. Daemon applies via
// FilterMgr::addFilter / addZoneFilter, persists to the corresponding
// XML file, and broadcasts an updated FilterRulesUpdate to all
// connected clients on the resulting filtersChanged signal.
message AddFilterRule {
  uint32 filter_type = 1;
  string pattern     = 2;
  bool   per_zone    = 3;
}

message RemoveFilterRule {
  uint32 filter_type = 1;
  string pattern     = 2;
  bool   per_zone    = 3;
}

message ClientEnvelope {
  oneof payload {
    Subscribe        subscribe          = 1;
    AddFilterRule    add_filter_rule    = 2;
    RemoveFilterRule remove_filter_rule = 3;
  }
}
