syntax = "proto3";

package seq.v1;

// Every server->client message is wrapped in an Envelope with a monotonic
// `seq` so clients can detect gaps and resume.
message Envelope {
  uint64 seq = 1;
  uint64 server_ts_ms = 2;

  oneof payload {
    Snapshot          snapshot      = 10;
    ZoneChanged       zone_changed  = 11;
    SpawnAdded        spawn_added   = 12;
    SpawnUpdated      spawn_updated = 13;
    SpawnRemoved      spawn_removed = 14;
    SpawnKilled       spawn_killed  = 15;
    PlayerStats       player_stats  = 16;
    ChatMessage       chat          = 17;
    ExperienceTick    exp           = 18;
    GroupUpdate       group         = 19;
    BuffsUpdate       buffs         = 20;
    CombatEvent       combat        = 21;
    CategoriesUpdate  categories    = 22;
    FilterRulesUpdate filter_rules  = 23;
    PrefsSnapshot     prefs         = 24;
    PrefChanged       pref_changed  = 25;
    Considered        considered    = 26;
    Targeted          targeted      = 27;
    SpawnPointAdded   spawn_point_added    = 28;
    SpawnPointUpdated spawn_point_updated  = 29;
    SpawnPointRemoved spawn_point_removed  = 30;
    SpawnPointsCleared spawn_points_cleared = 31;
    DevicesList       devices_list         = 32;
    ItemLearned       item_learned         = 33;
    ItemCacheTotals   item_totals          = 34;
    WornSet           worn_set             = 35;
  }
}

// EverQuest ships positions as int16 with a 3-bit fractional shift (see
// showeq-c/src/fixpt.h). We pass the raw fixed-point values through —
// clients that want world units do the shift.
message Pos {
  sint32 x = 1;
  sint32 y = 2;
  sint32 z = 3;
  sint32 vx = 4;
  sint32 vy = 5;
  sint32 vz = 6;
  // Heading in degrees, 0..359, compass convention (0=N, 90=E, 180=S,
  // 270=W). Daemon converts from EQ's raw representation (12-bit for the
  // player, 8-bit for other spawns, both stored truncated to int8_t in
  // the legacy classes) so clients don't have to special-case formats.
  int32  heading = 7;
  int32  delta_heading = 8;
  uint32 animation = 9;
}

enum SpawnType {
  SPAWN_UNSPECIFIED = 0;
  NPC = 1;
  PC = 2;
  CORPSE_PC = 3;
  CORPSE_NPC = 4;
  DOOR = 5;
  DROP = 6;
}

message Spawn {
  uint32     id = 1;
  string     name = 2;
  string     last_name = 3;
  uint32     level = 4;
  uint32     race = 5;
  uint32     class_ = 6;
  uint32     deity = 7;
  uint32     hp_cur = 8;
  uint32     hp_max = 9;
  SpawnType  type = 10;
  Pos        pos = 11;
  uint32     guild_id = 12;
  uint32     guild_server_id = 13;
  bool       is_gm = 14;
  bool       is_linkdead = 15;
  bool       is_invis = 16;
  // Bitmask of FilterMgr categories this spawn matched (Hunt=1, Caution=2,
  // Danger=4, Locate=8, Alert=16, Filtered=32, Tracer=64, ...). Mirrors
  // showeq-c/src/spawn.h:147 — FilterMgr recomputes on add and on each
  // spawn update.
  uint32     filter_flags = 17;
  // Indices (into the latest CategoriesUpdate.categories) of the
  // user-defined Category groupings that this spawn matches. Computed
  // by the daemon on SpawnAdded only — incremental SpawnUpdated events
  // do not refresh memberships, so name changes mid-life won't move a
  // spawn between categories. (Acceptable v1 simplification.)
  repeated uint32 category_ids = 18 [packed = true];
}

message Snapshot {
  string         zone_short = 1;
  string         zone_long = 2;
  uint32         player_id = 3;
  repeated Spawn spawns = 4;
  // Geometry of the current zone's .map file. Omitted if the daemon has not
  // resolved a map for the zone (e.g. before the first zone packet, or when
  // no .map file is installed for the zone).
  // TODO(phase-future): revisit serving maps over a static HTTP endpoint so
  // the browser can cache them across sessions. Inline for v1 keeps one
  // transport.
  MapGeometry    geometry = 5;
  // Session id assigned (or echoed back) by the daemon. Clients persist
  // it and pass it via Subscribe.session_id on reconnect to ask for a
  // resume from Subscribe.last_seq instead of a fresh Snapshot. Empty
  // for the daemon-internal --record-golden adapter (no client to
  // resume).
  string         session_id = 6;
  // SpawnMonitor's currently-promoted spawn points for this zone. Empty
  // before the first NPC pop after entering the zone — points only get
  // promoted from the candidate pool once a second spawn arrives at the
  // same coords.
  repeated SpawnPoint spawn_points = 7;
  // Daemon's persistent ItemCache contents — every item ever observed
  // via OP_ItemPacket. Subsequent inserts arrive as ItemLearned events.
  repeated Item       items        = 8;
  // Sum of HP/mana/AC/stats over the items currently equipped (player's
  // worn slots, populated from the OP_ItemPacket wrapper's main_slot/
  // sub_slot fields). Re-sent as ItemCacheTotals events on each worn
  // change. Empty until the first equip/un-equip event after subscribe.
  ItemCacheTotals     item_totals  = 9;
  // Slot → itemId map of the player's currently equipped gear, with the
  // same per-slot semantics as ItemCacheTotals. Re-sent as WornSet
  // events on each change.
  WornSet             worn_set     = 10;
}

message ZoneChanged {
  string      zone_short = 1;
  string      zone_long = 2;
  // See Snapshot.geometry TODO.
  MapGeometry geometry = 3;
}

// Vector geometry of a zone map, mirroring the layer/line/location model
// used by showeq-c/src/mapcore.{h,cpp}. For wire efficiency a line's points
// are transmitted as three packed coordinate arrays rather than a repeated
// Point message; zone maps frequently exceed 10k points and per-point
// message overhead would triple the payload.
message MapLine {
  // Hex color string as stored in the .map file (e.g. "#ff8040"). The
  // client maps these to its palette; daemon does not normalize.
  string         color = 1;
  // Packed coordinate arrays. x.size() == y.size(). z is either empty
  // (line has no height information), length 1 (single shared z for the
  // whole line), or equal to x.size() (per-point z).
  repeated sint32 x = 2 [packed = true];
  repeated sint32 y = 3 [packed = true];
  repeated sint32 z = 4 [packed = true];
  // 0-based layer index this line came from (mirrors MapData::mapLayer
  // ordering — base = 0, _1 = 1, _2 = 2, ...). Lets the client toggle
  // individual layer visibility without re-streaming.
  uint32         layer = 5;
}

message MapLocation {
  string name    = 1;
  string color   = 2;
  sint32 x       = 3;
  sint32 y       = 4;
  sint32 z       = 5;
  bool   z_valid = 6;
  uint32 layer   = 7;
}

message MapGeometry {
  sint32               min_x     = 1;
  sint32               min_y     = 2;
  sint32               max_x     = 3;
  sint32               max_y     = 4;
  repeated MapLine     lines     = 5;
  repeated MapLocation locations = 6;
}

message SpawnAdded {
  Spawn spawn = 1;
}

// Proto3 field presence (`optional`) gives us per-field diffs: only changed
// fields are sent on the wire.
message SpawnUpdated {
  uint32          id = 1;
  optional Pos    pos = 2;
  optional uint32 hp_cur = 3;
  optional uint32 level = 4;
  optional uint32 animation = 5;
  optional string name = 6;
  optional uint32 filter_flags = 7;
}

message SpawnRemoved {
  uint32 id = 1;
}

message SpawnKilled {
  uint32 deceased_id = 1;
  uint32 killer_id = 2;
}

// Snapshot of the user's character state. Sent once after Subscribe and
// then re-sent whenever any of the source Player signals fire (statChanged,
// hpChanged, manaChanged, levelChanged, expChangedInt, expAltChangedInt).
// Fields default to 0 before the player profile arrives.
message PlayerStats {
  uint32 hp_cur      = 1;
  uint32 hp_max      = 2;
  uint32 mana_cur    = 3;
  uint32 mana_max    = 4;
  // Endurance — the run/jump bar EQ paints in yellow, fed from
  // OP_EndUpdate (resolved 2026-04-28). Distinct from OP_Stamina,
  // which tracks hunger/thirst on the daemon side and isn't
  // surfaced over the wire.
  uint32 endurance_cur = 5;
  uint32 endurance_max = 6;
  uint32 level       = 7;
  uint32 exp_cur     = 8;
  uint32 exp_max     = 9;
  uint32 aa_exp_cur  = 10;
  uint32 aa_exp_max  = 11;
  // Total AAs spent (including glyphs on Live). 0 on Quarm: the EQMac
  // wire format doesn't carry a spent count separately. Use aa_unspent
  // (field 24) for "points ready to spend" — that one is populated by
  // both daemons.
  uint32 aa_points   = 12;
  string name        = 13;
  uint32 class_      = 14;
  uint32 race        = 15;
  uint32 str         = 16;
  uint32 sta         = 17;
  uint32 agi         = 18;
  uint32 dex         = 19;
  uint32 wis         = 20;
  uint32 int_        = 21;
  uint32 cha         = 22;
  // Sparse list — only skills the player has learned (legacy showeq uses
  // value=255 as an "invalid/unlearned" sentinel; daemon filters those
  // before sending). Names live in the web client (mirror of
  // showeq-daemon/src/skills.h). Updated on every Player::changeSkill /
  // addSkill so the client can diff and synthesize a "skill-up" log.
  repeated SkillEntry skills = 23;
  // Unspent AA points the player can allocate. Live: charProfileStruct
  // aa_unspent at wire offset 19519 (resolved 2026-05-02). Quarm: the
  // single Mac aapoints field IS the unspent count (per
  // showeq-daemon-quarm/src/everquest.h:788).
  uint32 aa_unspent  = 24;
}

message SkillEntry {
  uint32 skill_id = 1;
  uint32 value    = 2;
}

// Single chat-channel message. Covers both player-to-player chat
// (Guild/Group/Shout/Auction/OOC/Tell/Say/Raid via OP_ChannelMessage)
// and server-side coloured text (NPC speech, loot rolls, exp ticks,
// spell wear-offs, etc. via OP_FormattedMessage / OP_SimpleMessage /
// OP_SpecialMessage).
message ChatMessage {
  // Channel index from showeq-daemon/src/message.h's MessageType enum:
  // 0=Guild, 2=Group, 3=Shout, 4=Auction, 5=OOC, 7=Tell, 8=Say,
  // 11=GMSay, 14=GMTell, 15=Raid. Server-coloured messages collapse
  // onto a small set of MTs (see chat_color for full fidelity).
  uint32 channel = 1;
  string from    = 2;
  // Target (recipient) name — only meaningful for tells; empty for
  // broadcast channels.
  string target  = 3;
  string text    = 4;
  // Raw EQ ChatColor (CC_* in showeq-daemon/src/everquest.h). Carries
  // the full client-side colour fidelity for OP_FormattedMessage /
  // SimpleMessage / SpecialMessage. 0 (CC_Default) when the message
  // came in via OP_ChannelMessage and there's no wire colour to relay
  // — clients should fall back to `channel` in that case.
  uint32 chat_color = 5;
}

message GroupMember {
  uint32 slot     = 1;   // 0..MAX_GROUP_MEMBERS-1 (= 5)
  string name     = 2;   // empty if the slot isn't filled
  bool   in_zone  = 3;   // true when GroupMgr has a Spawn for this slot
  uint32 spawn_id = 4;   // 0 when out of zone
  uint32 level    = 5;
  uint32 class_   = 6;
}

// Sent on Subscribe + on every GroupMgr `added`/`removed`/`cleared`
// signal. `members` always carries all 6 slots (unfilled slots have
// empty name + in_zone=false) so the client can render fixed slots.
message GroupUpdate {
  repeated GroupMember members = 1;
}

// One active buff on the player. Daemon resends the full BuffsUpdate
// (all currently-active buffs) on every SpellShell add/del/change/clear.
// `duration_s` is the seconds remaining as of `captured_ms`; clients
// tick down locally without further server round-trips.
message Buff {
  uint32 spell_id    = 1;
  string spell_name  = 2;
  int32  duration_s  = 3;
  uint32 caster_id   = 4;
  string caster_name = 5;
  uint32 target_id   = 6;
  string target_name = 7;
}

message BuffsUpdate {
  // Server clock when this snapshot was taken. Clients pair this with
  // each Buff's duration_s to compute remaining time, accounting for
  // any drift between server and client wall clocks.
  uint64 captured_ms = 1;
  repeated Buff buffs = 2;
}

// Single combat event. Daemon emits one per parsed OP_Action2 on the
// monitored stream; web clients accumulate into a scrolling combat log.
// `type` is the EQ "action type" byte (bash/kick/cast/...) — see the
// type byte at offset 0040 in struct action2Struct (everquest.h:2042).
message CombatEvent {
  uint32 source_id   = 1;
  string source_name = 2;
  uint32 target_id   = 3;
  string target_name = 4;
  uint32 type        = 5;
  int32  damage      = 6;
  uint32 spell_id    = 7;
  string spell_name  = 8;
}

// One user-defined Category from showeq-daemon/src/category.h's
// CategoryMgr — name + display color. The daemon's filter pattern
// (Category::filter / filterout strings) is not exposed; matching
// happens daemon-side, and the client only sees the resulting per-
// spawn category_ids list.
message Category {
  uint32 id    = 1;   // index into CategoriesUpdate.categories
  string name  = 2;
  string color = 3;   // "#rrggbb"
}

// Sent on Subscribe + on every CategoryMgr add/del/cleared/loaded
// signal. Replaces the previous list wholesale.
message CategoriesUpdate {
  repeated Category categories = 1;
}

// One filter rule from FilterMgr. `filter_type` is the showeq-c
// FilterTypeDefs index (0=Hunt, 1=Caution, 2=Danger, 3=Locate, 4=Alert,
// 5=Filtered, 6=Tracer). Pattern syntax matches the legacy FilterItem
// (substring match plus optional ":<minlevel>-<maxlevel>" suffix).
// `per_zone` distinguishes the always-on global file from the
// per-zone-shortname overlay file.
message FilterRule {
  uint32 filter_type = 1;
  string pattern     = 2;
  uint32 min_level   = 3;
  uint32 max_level   = 4;
  bool   per_zone    = 5;
}

// Sent on Subscribe + on every FilterMgr filtersChanged signal.
// Carries the full current rule set (global + per-zone) so editors
// can render a single combined view.
message FilterRulesUpdate {
  repeated FilterRule rules = 1;
}

// Placeholder messages for later phases. Left intentionally thin so field
// numbers can be assigned meaningfully once the widgets are designed.
message ExperienceTick { reserved 1 to 15; }

// One global preference. Daemon-side storage stays XML (XMLPreferences,
// inherited from showeq-c) but only an allowlisted subset is published
// over the wire — the daemon's PrefsBroker decides which keys are
// shareable. The value is typed via oneof; the daemon converts to/from
// XMLPreferences's QVariant storage on its side.
message Pref {
  string section = 1;
  string key     = 2;
  oneof value {
    string string_value = 3;
    int64  int_value    = 4;
    double double_value = 5;
    bool   bool_value   = 6;
  }
}

// Sent on Subscribe with every allowlisted pref's current value (or its
// default if no user override is set). Replaces wholesale; clients should
// not assume incremental.
message PrefsSnapshot {
  repeated Pref prefs = 1;
}

// Broadcast to every connected client whenever an allowlisted pref
// changes — either via SetPref from any client, or via a non-RPC source
// inside the daemon (e.g. legacy code paths that still call
// pSEQPrefs->setPref* directly).
message PrefChanged {
  Pref pref = 1;
}

// Fired when a /consider packet (OP_Consider) is parsed. spawn_id is the
// considered target's id (0 if the target is no longer in the spawn list,
// though the daemon currently filters those out at the source). Clients
// decide locally whether this should drive UI selection.
message Considered {
  uint32 spawn_id = 1;
}

// Fired when a clientTarget packet (OP_TargetMouse / target hotkey) is
// parsed. spawn_id is the new target's id; 0 means the player cleared
// their target. Clients decide locally whether this should drive UI
// selection.
message Targeted {
  uint32 spawn_id = 1;
}

// One promoted spawn point as tracked by showeq-daemon's SpawnMonitor —
// a recurring NPC pop location with a learned respawn cycle. Points are
// promoted once the same coords see a second spawn after a death; the
// time gap between the death and that second pop becomes diff_time_s,
// the cycle time. Clients compute the seconds-until-next-pop locally
// from `diff_time_s - (now - death_time_s)` so a per-second client tick
// doesn't require any server round-trips.
message SpawnPoint {
  // Stable identity for this point. Mirrors legacy SpawnPoint::key
  // (decimal x|y|z concatenated without separators) so resume + replay
  // semantics line up with the in-memory hashmap. Treat as opaque —
  // x/y/z are also carried below for client display.
  string key          = 1;
  sint32 x            = 2;
  sint32 y            = 3;
  sint32 z            = 4;
  // User-assigned name (via "rename" — empty until set). Distinct from
  // `last`, the name of the most recent spawn at this point.
  string name         = 5;
  string last         = 6;
  uint32 last_id      = 7;
  uint32 count        = 8;
  // Wall-clock seconds since epoch. spawn_time_s is the most recent
  // pop; death_time_s is 0 until the point's last spawn dies. Once both
  // are non-zero, diff_time_s is the learned cycle time (the gap
  // between death_time_s and the next spawn_time_s).
  uint64 spawn_time_s = 9;
  uint64 death_time_s = 10;
  uint64 diff_time_s  = 11;
}

message SpawnPointAdded   { SpawnPoint point = 1; }
message SpawnPointUpdated { SpawnPoint point = 1; }
message SpawnPointRemoved { string key = 1; }
// SpawnMonitor::clear() (zone change, explicit "clear all" from a
// client). Empty payload — clients drop their entire spawn-point map.
message SpawnPointsCleared {}

// One pcap interface as reported by pcap_findalldevs. Mirrors the
// minimum set of fields a UI needs to render a device picker —
// description and is_loopback are best-effort and may be empty/false
// on platforms or pcap builds that don't supply them.
message NetworkDevice {
  string name = 1;          // pcap interface name (e.g. "eth0", "wlp3s0")
  string description = 2;
  bool   is_loopback = 3;
}

// Response to a ListDevices request. Sent only to the requesting
// session — not broadcast — since it's session-scoped UI data.
message DevicesList {
  repeated NetworkDevice devices = 1;
}

// One item template the daemon has parsed from an OP_ItemPacket and
// cached. Mirrors src/itempacket.h ItemTemplate. Wire format gives
// BASE values; equipped augments contribute via separate Item entries
// (each aug is itself an item served via OP_ItemPacket).
message Item {
  uint32 id        = 1;
  string name      = 2;
  // Omitted when identical to `name`. Lore-locked items typically carry
  // the lore version separately in the EQ wire format.
  string lore_name = 3;
  // EQ slot bitmask: 0x6000=Pri|Sec, 0x18000=Ring1|Ring2, 0x20=Neck,
  // 0x20000=Chest, etc. See parsedItemTemplateStruct for the full set
  // observed on the wire.
  uint32 slot_mask = 4;
  // Flags blob (size enum at byte[19] + bit-packed flags). Not yet
  // fully decoded; passed through for clients that want to inspect.
  uint32 flags     = 5;
  float  weight    = 6;
  int32  hp        = 7;
  int32  mana      = 8;
  int32  endurance = 9;
  int32  ac        = 10;
  // [STR, STA, AGI, DEX, CHA, INT, WIS] — 7 entries, matches
  // src/itempacket.h ItemStatIndex.
  repeated int32 stats   = 11 [packed = true];
  // [CR, DR, PR, MR, FR] — 5 entries, matches ItemResistIndex.
  repeated int32 resists = 12 [packed = true];
  int32 corruption = 13;
}

// Fired when ItemCache::insert() succeeds — either a brand-new item
// or an updated one (we re-emit on overwrite so clients see fresh
// stats if a future OP_ItemPacket revises an existing entry).
message ItemLearned {
  Item item = 1;
}

// Aggregate sums across the player's currently equipped gear. The
// daemon tracks worn-slot membership from each OP_ItemPacket wrapper
// (main_slot=0, sub_slot in [0..22]) and re-sums on every change.
// `item_count` is the number of populated worn slots, NOT the cache
// size — empty slots (e.g. PowerSource for characters without one) do
// not contribute. Stats are BASE values from the item template; aug
// contributions are not yet folded in.
message ItemCacheTotals {
  uint32 item_count = 1;
  int32  hp         = 2;
  int32  mana       = 3;
  int32  endurance  = 4;
  int32  ac         = 5;
  repeated int32 stats   = 6 [packed = true];
  repeated int32 resists = 7 [packed = true];
  int32  corruption = 8;
}

// Snapshot of the player's currently equipped gear, by worn-slot
// index. Slot indices use the standard EQ enum (see itempacket.h):
// 0=Charm, 1=Ear_L, 2=Head, 3=Face, 4=Ear_R, 5=Neck, 6=Shoulder,
// 7=Arms, 8=Back, 9=Wrist_L, 10=Wrist_R, 11=Range, 12=Hands,
// 13=Primary, 14=Secondary, 15=Finger_L, 16=Finger_R, 17=Chest,
// 18=Legs, 19=Feet, 20=Waist, 21=PowerSrc, 22=Ammo. Unfilled slots
// are absent. `slot_indices` and `item_ids` are parallel arrays (same
// length, same index ordering) sorted ascending by slot — parallel-
// arrays rather than map<> for stable wire ordering across runs.
// Note: field name `slots` is reserved here because it collides with
// Qt's `slots:` access-label keyword in generated C++ headers.
message WornSet {
  repeated int32  slot_indices = 1 [packed = true];
  repeated uint32 item_ids     = 2 [packed = true];
}
